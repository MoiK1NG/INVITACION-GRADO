<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Preview WhatsApp -->
  <meta property="og:title" content="Invitación a mi graduación 🎓">
  <meta property="og:description" content="Acompáñame a celebrar este logro tan importante">
  <meta property="og:type" content="website">

  <title>Graduación Moisés</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      font-family: Arial, sans-serif;
    }

    .invite-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: #0a0a0a;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #c9a84c;
      margin: 0 auto;
    }

    .content {
      padding: 22px 20px 24px;
      text-align: center;
    }

    .cap-icon {
      font-size: 48px;
      margin-bottom: 8px;
    }

    .main-title {
      font-size: 30px;
      font-weight: bold;
      color: #fff;
      margin-bottom: 10px;
    }

    .ribbon {
      background: linear-gradient(135deg,#c9a84c,#f5d78e);
      padding: 6px 16px;
      border-radius: 6px;
      display: inline-block;
      margin: 10px 0;
      color: #000;
      font-weight: bold;
      font-size: 12px;
    }

    .graduate-name {
      font-size: 20px;
      color: #f5d78e;
      margin: 12px 0;
      font-weight: bold;
    }

    .info-box {
      margin: 10px 0;
      padding: 10px;
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 10px;
      color: #fff;
    }

    .venue {
      margin-top: 12px;
      font-size: 14px;
      color: #ccc;
      line-height: 1.5;
    }

    .btn {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 20px;
      background: linear-gradient(135deg,#c9a84c,#f5d78e);
      color: #000;
      border-radius: 20px;
      text-decoration: none;
      font-weight: bold;
      font-size: 13px;
    }

    /* 🔥 OPTIMIZACIÓN MÓVIL */
    @media (max-width: 480px) {
      .card {
        max-width: 95%;
      }

      .main-title {
        font-size: 26px;
      }

      .graduate-name {
        font-size: 18px;
      }

      .content {
        padding: 20px 16px;
      }
    }
  </style>
</head>

<body>

<div class="invite-wrapper">
  <div class="card">
    <div class="content">

      <div class="cap-icon">🎓</div>

      <div class="main-title">Graduación</div>

      <div class="ribbon">Ingeniero Industrial</div>

      <div class="graduate-name">Moisés Camargo Pérez</div>

      <div class="info-box">
        📅 Viernes 24 de Abril 2026<br>
        🕗 8:00 PM<br>
        👔 Formal
      </div>

      <div class="venue">
        📍 Salón de Eventos La Mona<br>
        Cra. 3 #45-15<br>
        Barranquilla
      </div>

      <a class="btn" href="https://maps.app.goo.gl/Km8Y9w258gdDFMvu5" target="_blank">
        Ver ubicación
      </a>

    </div>
  </div>
</div>

</body>
</html>
